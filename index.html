<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#7b5bd6">
<title>英語片語</title>
<link rel="manifest" href="manifest.json">
<!-- iOS (Safari) 加到主畫面 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="英語片語">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
:root{--blue:#7b5bd6;--blue2:#a48ee6;--grad:linear-gradient(135deg,#7b5bd6,#9d86e6);--ok:#18a05a;--bad:#e2574c;--warn:#f5a623;--bg:#f1eefb;--card:#fff;--ink:#26224a;--soft:#efeafb;--muted:#6f6a86;--line:#ece8f8;--sh:0 10px 30px rgba(40,64,140,.08),0 2px 6px rgba(40,64,140,.04);--sh2:0 6px 18px rgba(40,64,140,.06),0 1px 2px rgba(40,64,140,.04);--r:22px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:focus-visible{outline:3px solid #ffae33;outline-offset:2px;border-radius:8px}
body.big{zoom:1.18}
body{margin:0;font-family:"PingFang TC","Microsoft JhengHei",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
#app{max-width:560px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow-x:hidden}
.nm,.un,.us,.stem,.opt,.flash .w,.passage,.mt{overflow-wrap:anywhere}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));background:var(--grad);color:#fff;position:sticky;top:0;z-index:5;box-shadow:0 2px 12px rgba(60,90,180,.16)}
.topbar h1{font-size:18px;margin:0;flex:1;font-weight:800;letter-spacing:.2px}
.topbar .backbtn{background:rgba(255,255,255,.22);color:#fff;border:0;border-radius:11px;min-width:40px;height:34px;font-size:20px;font-weight:800;cursor:pointer;margin-right:8px}
.topbar .who{font-size:13px;font-weight:600;background:rgba(255,255,255,.2);padding:6px 12px;border-radius:20px;cursor:pointer}
.wrap{flex:1;padding:16px;overflow:auto}
body.hasnav .wrap{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:560px;width:100%;display:none;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:12;box-shadow:0 -4px 18px rgba(60,90,160,.07);padding-bottom:env(safe-area-inset-bottom)}
body.hasnav .botnav{display:flex}
.botnav button{position:relative;flex:1;border:0;background:none;padding:9px 0 10px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:color .15s}
.botnav button i{font-size:22px;font-style:normal;line-height:1;transition:transform .15s}
.botnav button span{font-size:11px;font-weight:700}
.botnav button.on{color:var(--blue)}
.botnav button.on i{transform:translateY(-1px) scale(1.12)}
.botnav button.on::before{content:"";position:absolute;top:0;width:26px;height:3px;border-radius:0 0 4px 4px;background:var(--grad)}
.ring{width:76px;height:76px;border-radius:50%;background:conic-gradient(var(--rc,var(--blue)) calc(var(--p,0)*3.6deg), #e4ebfa 0);display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.02)}
.ring>span{width:58px;height:58px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--ink)}
.ring>span small{font-size:9px;font-weight:600;color:var(--muted)}
.skill{background:var(--card);border-radius:var(--r);padding:16px 8px;min-height:158px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;border:1px solid rgba(233,238,251,.7);box-shadow:var(--sh2);transition:transform .14s,box-shadow .14s}
.skill:active{transform:scale(.97)}
.skill .t{font-weight:800;margin-top:11px;font-size:14px}
.skill .s{font-size:11px;color:var(--muted);margin-top:3px}
.mrow{display:flex;align-items:center;gap:13px;padding:14px;background:#fff;border:1px solid var(--line);border-radius:18px;margin:10px 0;cursor:pointer;box-shadow:var(--sh2);transition:transform .12s}
.mrow:active{transform:scale(.99)}
.mrow .mi{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--soft)}
.mrow .mt{flex:1}.mrow .mt b{font-weight:800}.mrow .mt div{font-size:12px;color:var(--muted);margin-top:2px}
.unitcard{display:flex;align-items:center;gap:11px;padding:12px 14px;background:#fff;border:1px solid var(--line);border-radius:16px;margin:8px 0;cursor:pointer;box-shadow:var(--sh2);transition:transform .12s}
.unitcard:active{transform:scale(.99)}
.unitcard .ub{flex:1;min-width:0}.unitcard .un{font-weight:700;font-size:15px}.unitcard .us{font-size:12px;color:var(--muted);margin-top:3px}
.unitcard .ub .bar{margin:6px 0 0!important;height:7px}
.unitcard .mi{width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:21px;flex:0 0 auto}
.unitcard>div:last-child:not(.ub):not(.mi):not(.dot),.mrow>div:last-child:not(.mt):not(.mi),.row>div:last-child:not(.nm){color:#c3cddd;font-size:13px;font-weight:800;flex:0 0 auto}
.dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px rgba(0,0,0,.03)}
.dot.new{background:#cdd6e6}.dot.ing{background:var(--blue)}.dot.done{background:var(--ok)}
.btn{display:block;width:100%;border:0;border-radius:16px;padding:16px;font-size:17px;font-weight:800;cursor:pointer;background:var(--grad);color:#fff;margin:10px 0;box-shadow:0 6px 16px rgba(79,110,247,.28);transition:transform .12s,box-shadow .12s}
.btn:active{transform:translateY(1px) scale(.99);box-shadow:0 3px 10px rgba(79,110,247,.24)}
.btn.sec{background:var(--soft);color:var(--blue);box-shadow:none}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid #dde5f5;box-shadow:none}
.install-btn{display:flex;align-items:center;gap:8px;width:100%;border:0;border-radius:15px;padding:14px 16px;font-size:15px;font-weight:800;cursor:pointer;background:#eafaf1;color:#128049;margin:0 0 12px;box-shadow:var(--sh2)}
.install-btn.sec{background:var(--soft);color:var(--blue)}
.install-tip{background:#fff7e6;border:1px solid #ffe0a3;border-radius:15px;padding:14px;font-size:14px;line-height:1.9;margin:0 0 12px}
.install-tip .install-x{display:inline-block;margin-top:8px;color:var(--blue);font-weight:800;cursor:pointer}
.btn[disabled]{opacity:.5;box-shadow:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--card);border-radius:var(--r);padding:18px;min-height:158px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;border:1px solid rgba(233,238,251,.7);box-shadow:var(--sh2);transition:transform .14s}
.tile:active{transform:scale(.98)}
.tile .ico{font-size:34px}.tile .t{font-weight:800;margin-top:10px}.tile .s{font-size:12px;color:var(--muted);margin-top:4px}
.card{background:var(--card);border-radius:var(--r);padding:17px;margin:12px 0;border:1px solid rgba(233,238,251,.7);box-shadow:var(--sh)}
.h2{font-size:16px;font-weight:800;margin:16px 2px 10px}
.passage{background:var(--soft);border-radius:14px;padding:14px;font-size:15px;line-height:1.8;white-space:pre-wrap;margin-bottom:6px}
.passage .wd{cursor:pointer;border-bottom:1px dotted #a9bbe4}
.passage .wd.got{border-bottom:2px solid #1e8e4e;color:#1e8e4e;font-weight:600}
.passage .wd:active{background:#fff2cc}
.wdhint{font-size:12px;color:var(--muted);margin:0 2px 12px}
.stem{font-size:18px;font-weight:700;line-height:1.6;margin:6px 0 14px}
.opt{display:block;width:100%;text-align:left;background:#fff;border:2px solid #e3e9f6;border-radius:15px;padding:14px;margin:10px 0;font-size:16px;cursor:pointer;box-shadow:var(--sh2);transition:transform .1s,border-color .1s}
.opt:active{transform:scale(.99)}
.opt .lab{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;text-align:center;background:var(--soft);color:var(--blue);border-radius:50%;font-weight:800;margin-right:11px;vertical-align:middle}
.opt.ok{border-color:var(--ok);background:#e9faf1}.opt.ok .lab{background:var(--ok);color:#fff}
.opt.bad{border-color:var(--bad);background:#fdeeec}.opt.bad .lab{background:var(--bad);color:#fff}
.opt[disabled]{cursor:default;opacity:.96}
.expl{background:#fff7e6;border:1px solid #ffe0a3;border-radius:15px;padding:13px;margin-top:12px;font-size:14px;line-height:1.6}
.bar{height:9px;background:#e4ebfa;border-radius:9px;overflow:hidden;margin:2px 0 14px}
.bar>i{display:block;height:100%;background:var(--grad);border-radius:9px;transition:width .4s ease}
.row{display:flex;align-items:center;gap:10px;padding:13px;background:#fff;border:1px solid var(--line);border-radius:15px;margin:9px 0;box-shadow:var(--sh2)}
.row .nm{flex:1;font-weight:700}
.pill{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--soft);color:var(--blue);font-weight:700}
.pill.d1{background:#e7f8ee;color:#158048}.pill.d2{background:#fff2df;color:#9a6200}.pill.d3{background:#fdeae7;color:#c73a2b}
.profile{display:flex;align-items:center;gap:14px;padding:16px;background:#fff;border:1px solid var(--line);border-radius:18px;margin:10px 0;cursor:pointer;box-shadow:var(--sh2);transition:transform .12s}
.profile:active{transform:scale(.99)}
.ava{width:48px;height:48px;border-radius:50%;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:inset 0 0 0 1px rgba(79,110,247,.08)}
.muted{color:var(--muted);font-size:13px}
.center{text-align:center;padding:34px 10px}
.fab{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);max-width:528px;width:calc(100% - 32px)}
input,select{font-size:16px;padding:12px;border:1px solid #dde5f5;border-radius:12px;width:100%;font-family:inherit}
.tag{font-size:12px;color:var(--muted)}
.statbig{font-size:32px;font-weight:800;color:var(--blue);letter-spacing:.5px}
.flash{min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;background:linear-gradient(160deg,#fff,#f5f8ff);border:1px solid #dfe7fb;box-shadow:0 10px 26px rgba(40,64,140,.10);padding:24px}
.flash .w{font-size:40px;font-weight:800;letter-spacing:.5px}.flash .p{color:var(--muted);margin-top:8px}.flash .z{font-size:26px;margin-top:16px;color:var(--blue);font-weight:700}
.seg{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
.seg button{flex:1;min-width:70px;padding:11px;border-radius:13px;border:1px solid #dde5f5;background:#fff;font-weight:700;cursor:pointer;transition:transform .1s}
.seg button:active{transform:scale(.97)}
.seg button.on{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(79,110,247,.24)}
.gradeRow{display:flex;gap:10px;margin-top:10px}
.gradeRow button{flex:1;padding:15px;border-radius:15px;border:0;font-weight:800;font-size:15px;color:#fff;cursor:pointer;box-shadow:var(--sh2);transition:transform .1s}
.gradeRow button:active{transform:scale(.97)}
</style>
</head>

</div>
<script>
const DATA = {"version":"phrase-1.0","notes":{"pv_basic":{"topicKey":"pv_basic","title":"常用動詞片語","summary":"動詞片語(phrasal verbs)是「動詞＋介系詞／副詞」的固定組合，意思常常無法從字面直接猜出，例如 give up 不是「給上去」而是「放棄」。這類片語在會考、學測的閱讀與克漏字中出現頻率極高，也是日常口說的核心。建議整組記憶，並特別留意固定搭配的介系詞(如 look forward to 後面接動名詞)，多用例句熟悉語感。","sections":[{"h":"常用片語速記","body":"本單元收錄 47 個常用動詞片語。下面列出部分，完整清單請到「片語卡」翻閱。","examples":["look after — 照顧、照料","give up — 放棄","put off — 拖延、延期","run out of — 用完、耗盡","get along with — 與(某人)相處融洽","look forward to — 期待、盼望","take care of — 照顧、處理","turn on — 打開(電器、開關)","turn off — 關掉(電器、開關)","pick up — 接送、撿起、學會","find out — 查明、發現(真相、資訊)","look for — 尋找","look up — 查閱(字典、資料)","look into — 調查、研究","grow up — 長大、成長","get up — 起床、起身","wake up — 醒來、叫醒","put on — 穿上、戴上"]}],"mistakes":[],"tip":"片語重在整組記憶與語感，多看例句、在克漏字中練習填空最有效。"},"pv_adv":{"topicKey":"pv_adv","title":"進階動詞片語","summary":"進階動詞片語多由「動詞＋介系詞／副詞」組成，整體意思往往無法從字面直接猜出(例如 put up with 是「忍受」而非「舉起」)。這類片語是學測、會考閱讀與寫作的高頻重點，掌握它們能讓表達更道地。學習時建議連同搭配的受詞與情境一起記，並注意可分/不可分及後接名詞或 V-ing 的用法。","sections":[{"h":"常用片語速記","body":"本單元收錄 27 個進階動詞片語。下面列出部分，完整清單請到「片語卡」翻閱。","examples":["put up with — 忍受、容忍","look down on — 看不起、輕視","look up to — 尊敬、敬仰","make up for — 彌補、補償","get rid of — 擺脫、除掉","cut down on — 減少(用量、攝取)","figure out — 弄清楚、想通、算出","take over — 接管、接手","bring about — 帶來、造成、引發","turn out — 結果是、原來是","call off — 取消","give in — 讓步、屈服","run into — 偶然遇見；遭遇(困難)","take after — (長相或個性)像(某長輩)","bring up — 養育；提出(話題)","point out — 指出","catch up with — 趕上、追上","keep up with — 跟上、不落後"]}],"mistakes":[],"tip":"片語重在整組記憶與語感，多看例句、在克漏字中練習填空最有效。"},"be_adj_prep":{"topicKey":"be_adj_prep","title":"形容詞+介系詞","summary":"「形容詞+介系詞」是英文中極常見的固定搭配，形容詞後面該接哪個介系詞往往沒有規則可循，必須整組記憶，例如 be good at(擅長)、be afraid of(害怕)。這類片語常以「be 動詞+形容詞+介系詞+名詞/動名詞」的形式出現，介系詞後面若接動詞要用動名詞(V-ing)。會考與學測的克漏字、詞彙題經常鎖定介系詞的正確搭配，建議成組背誦、搭配例句加深印象。","sections":[{"h":"常用片語速記","body":"本單元收錄 43 個形容詞+介系詞。下面列出部分，完整清單請到「片語卡」翻閱。","examples":["be proud of — 以……為榮、感到驕傲","be famous for — 以……聞名","be worried about — 擔心、憂慮","be aware of — 意識到、察覺到","be capable of — 有能力做……","be responsible for — 對……負責","be fond of — 喜愛、喜歡","be tired of — 厭倦、受夠了","be full of — 充滿……","be similar to — 與……相似","be different from — 與……不同","be good for — 對……有益","be bad for — 對……有害","be angry with — 對(某人)生氣","be angry about — 對(某事)生氣","be sorry for — 為……感到抱歉、同情","be good to — 對(某人)友善、好","be kind to — 對……親切、善待"]}],"mistakes":[],"tip":"片語重在整組記憶與語感，多看例句、在克漏字中練習填空最有效。"},"prep_phrase":{"topicKey":"prep_phrase","title":"介系詞與名詞片語","summary":"介系詞片語與名詞片語常以固定搭配出現，介系詞(in / on / at / by / for)後面接特定名詞，整組意思往往無法逐字翻譯，必須整組記憶。這類片語在會考、學測的克漏字與閱讀中出現頻率極高，熟記固定搭配能大幅減少介系詞選錯的失分。學習時建議連同例句一起背，掌握語境用法。","sections":[{"h":"常用片語速記","body":"本單元收錄 47 個介系詞與名詞片語。下面列出部分，完整清單請到「片語卡」翻閱。","examples":["in charge of — 負責、掌管","on purpose — 故意地","by accident — 意外地、偶然地","in danger of — 有…的危險","in advance — 事先、預先","on time — 準時","in time — 及時、來得及","at least — 至少","at most — 至多、最多","in general — 一般而言、通常","for the sake of — 為了…的緣故","in terms of — 就…而言、在…方面","on behalf of — 代表…","in favor of — 贊成、支持","in need of — 需要","in spite of — 儘管、不顧","because of — 因為、由於","instead of — 而不是、代替"]}],"mistakes":[],"tip":"片語重在整組記憶與語感，多看例句、在克漏字中練習填空最有效。"},"connector":{"topicKey":"connector","title":"連接與轉折片語","summary":"連接與轉折片語是文章的「路標」，幫助讀者掌握句與句、段與段之間的邏輯關係，例如因果、對比、舉例、補充與總結。在會考與學測的閱讀測驗與克漏字中，這類片語常是解題關鍵；寫作時善用它們也能讓文章更通順有條理。學習時建議依「功能」分類記憶(因果、轉折、舉例、補充、結論)，並注意 due to、because of 後接名詞，而 so that 後接子句等文法差異。","sections":[{"h":"常用片語速記","body":"本單元收錄 34 個連接與轉折片語。下面列出部分，完整清單請到「片語卡」翻閱。","examples":["as a result — 結果;因此","in addition — 此外;另外","in other words — 換句話說","in conclusion — 總而言之;最後","above all — 最重要的是","what is more — 而且;更甚者","in contrast — 相較之下;相反地","due to — 由於","according to — 根據","for instance — 舉例來說","in fact — 事實上","on the contrary — 相反地","as well as — 以及;還有","in short — 簡言之","first of all — 首先","last but not least — 最後但同樣重要的","by contrast — 相比之下","as a matter of fact — 事實上"]}],"mistakes":[],"tip":"片語重在整組記憶與語感，多看例句、在克漏字中練習填空最有效。"},"time_freq":{"topicKey":"time_freq","title":"時間頻率與程度片語","summary":"這一類片語用來表達「時間、頻率與程度」：有的說明事情多久發生一次(once in a while、all the time)，有的點出何時發生或先後順序(from now on、at first、at last)，還有的描述程度深淺(more or less、to some extent)。它們大多是固定搭配，介系詞和字序都不能隨意更改，最好連同例句整組背下來。特別留意意思相近或形近的片語(如 at first／at last、on time／in time)，別在克漏字裡選錯。","sections":[{"h":"常用片語速記","body":"本單元收錄 33 個時間頻率與程度片語。下面列出部分，完整清單請到「片語卡」翻閱。","examples":["from now on — 從現在起、今後","sooner or later — 遲早、早晚","once in a while — 偶爾","from time to time — 不時、偶爾","all of a sudden — 突然、冷不防","more or less — 大約、差不多","day by day — 一天天地、逐日","little by little — 一點一點地、逐漸","for good — 永遠、從此不再","in no time — 立刻、很快地","now and then — 偶爾、有時","all the time — 一直、總是","right away — 立刻、馬上","in the long run — 長遠來看、最終","for the time being — 暫時、目前","once and for all — 一勞永逸地、徹底地","again and again — 一再地、反覆地、屢次","step by step — 逐步地、一步一步地"]}],"mistakes":[],"tip":"片語重在整組記憶與語感，多看例句、在克漏字中練習填空最有效。"},"idiom":{"topicKey":"idiom","title":"慣用語與諺語","summary":"慣用語(idioms)和諺語(proverbs)是英文中「字面意思」跟「真正意思」不同的固定說法，例如 a piece of cake 不是真的蛋糕，而是「輕而易舉的事」。會考和學測常在閱讀、克漏字或翻譯中考這類片語，死背字面往往會答錯。學習時要整組記下來，並搭配例句理解使用情境，才能又快又準地判讀。","sections":[{"h":"常用片語速記","body":"本單元收錄 42 個慣用語與諺語。下面列出部分，完整清單請到「片語卡」翻閱。","examples":["a piece of cake — 輕而易舉的事;小菜一碟","break the ice — 打破僵局;破冰(緩和陌生氣氛)","once in a blue moon — 千載難逢;極少發生","under the weather — 身體不舒服;不太對勁","keep an eye on — 看顧;留意;盯著","make up one's mind — 下定決心;做出決定","get cold feet — 臨陣退縮;突然膽怯","hit the road — 出發;上路","pull one's leg — 開某人玩笑;逗某人","better late than never — 遲到總比不到好;亡羊補牢","rain or shine — 風雨無阻;不論晴雨","cost an arm and a leg — 花大錢;所費不貲","hit the books — 用功讀書;開始苦讀","call it a day — 今天到此為止;收工","let the cat out of the bag — 不小心洩漏秘密","a blessing in disguise — 因禍得福;塞翁失馬","practice makes perfect — 熟能生巧","actions speak louder than words — 行動勝於言語"]}],"mistakes":[],"tip":"片語重在整組記憶與語感，多看例句、在克漏字中練習填空最有效。"},"daily":{"topicKey":"daily","title":"生活情境常用片語","summary":"生活情境常用片語是英語會話與寫作中出現頻率極高的「固定搭配」，它們的意思往往不能只靠單字字面拆解，而要整組記憶。掌握這些片語能讓你聽懂日常對話、寫出自然道地的句子，也是國中會考與高中學測克漏字、閱讀測驗的常見考點。建議搭配例句與語境一起背，多開口練習，久了就能自然脫口而出。","sections":[{"h":"常用片語速記","body":"本單元收 慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"Please ___ the baby for a moment; I need to answer the phone.","options":["pull the leg of","break the ice with","hit the road with","keep an eye on"],"answer":3,"explanation":"keep an eye on：看顧;留意;盯著。例：Could you keep an eye on my bag while I go to the restroom?","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0237","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"Stop hesitating! You have to ___ before the deadline tomorrow.","options":["make up one's mind","get cold feet","pull your leg","call it a day"],"answer":0,"explanation":"make up one's mind：下定決心;做出決定。例：After thinking for days, Amy finally made up her mind to study abroad.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0238","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"She planned to ask her teacher a question, but she ___ and stayed silent.","options":["broke the ice","hit the books","get cold feet","made up her mind"],"answer":2,"explanation":"get cold feet：臨陣退縮;突然膽怯。例：He wanted to give a speech, but he got cold feet at the last minute.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0239","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"Everyone's in the car and the bags are packed, so let's ___!","options":["hit the road","call it a day","break the ice","hit the books"],"answer":0,"explanation":"hit the road：出發;上路。例：It's getting late, so we'd better hit the road before the traffic gets worse.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0240","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"Did you really win the lottery, or are you ___?","options":["keeping an eye on me","pull one's leg","under the we e the Earth, start recycling—___.","options":["once in a blue moon","a piece of cake","actions speak louder than words","rain or shine"],"answer":2,"explanation":"actions speak louder than words：行動勝於言語。例：He keeps promising to help, but actions speak louder than words.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0250","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"If I study English by watching movies, I can relax and learn, ___.","options":["once in a blue moon","under the weather","better late than never","kill two birds with one stone"],"answer":3,"explanation":"kill two birds with one stone：一石二鳥;一舉兩得。例：By biking to school, I exercise and save money—killing two birds with one stone.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0251","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"You should follow the local customs abroad; as the saying goes, ___.","options":["actions speak louder than words","when in Rome, do as the Romans do","better late than never","practice makes perfect"],"answer":1,"explanation":"when in Rome, do as the Romans do：入境隨俗。例：In Japan, I bow when greeting people—when in Rome, do as the Romans do.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0252","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"Cheer up after the loss; remember that ___.","options":["actions speak louder than words","the early bird catches the worm","every cloud has a silver lining","a piece of cake"],"answer":2,"explanation":"every cloud has a silver lining：否極泰來;黑暗中總有希望。例：You failed once, but every cloud has a silver lining—you learned a lot.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0253","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"Sign  temper","keep one's word","pulls your leg","gets cold feet"],"answer":1,"explanation":"keep one's word：遵守諾言;信守承諾。例：A good leader always keeps his word.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0258","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"The customer started shouting; he completely ___ over a small mistake.","options":["kept his word","broke the ice","made up his mind","lose one's temper"],"answer":3,"explanation":"lose one's temper：發脾氣;動怒。例：Try not to lose your temper when you disagree with others.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0259","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"We still have two hours before the movie, so ___ with your lunch.","options":["take one's time","hit the road","get cold feet","call it a day"],"answer":0,"explanation":"take one's time：慢慢來;不用急。例：There's no rush; take your time to finish the drawing.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0260","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"You skipped class all week; it's time to ___ and talk to the principal.","options":["hit the road","face the music","take your time","break the ice"],"answer":1,"explanation":"face the music：面對現實;承擔後果。例：He broke the window, so now he has to face the music.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0261","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"Don't spend all your allowance; it's wise to ___.","options":["call it a day","save for a rainy day","hit the road","break the ice"],"answer":1,"explanation":"save for a rainy day：未雨綢繆;存錢以備不時之需。例：My grandma always tells me to save some money for a rainy day.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0262","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"Taking six advanced courses at once means you might ___.","options":["kill two birds with one stone","hit the books","take your time","bite off more than one can chew"],"answer":3,"explanation":"bite off more than one can chew：貪多嚼不爛;不自量力。例：He joined five clubs and bit off more than he could chew.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0263","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"We've finished half the exam and had no problems—___.","options":["better late than never","a piece of cake","once in a blue moon","so far so good"],"answer":3,"explanation":"so far so good：到目前為止一切順利。例：How's the new project going? So far so good.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0264","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"If you want strong muscles, you must work out hard—___.","options":["easier said than done","better late than never","a piece of cake","no pain, no gain"],"answer":3,"explanation":"no pain, no gain：一分耕耘,一分收穫;沒有付出就沒有收穫。例：Training is tough, but no pain, no gain.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0265","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"Don't say it's impossible; ___, so keep trying.","options":["better late than never","actions speak louder than words","where there's a will, there's a way","a piece of cake"],"answer":2,"explanation":"where there's a will, there's a way：有志者事竟成。例：She learned to walk again after the accident—where there's a will, there's a way.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0266","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"You think you're too old to study coding? Remember, ___.","options":["it's never too late to learn","a piece of cake","the early bird catches the worm","easier said than done"],"answer":0,"explanation":"it's never too late to learn：學習永遠不嫌晚;活到老學到老。例：My father started learning English at sixty—it's never too late to learn.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0267","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"Don't feel alone about the workload; we're all ___.","options":["under the weather","a piece of cake","once in a blue moon","in the same boat"],"answer":3,"explanation":"in the same boat：處境相同;同病相憐。例：We all failed the quiz, so we're in the same boat.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0268","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"I was so angry at the rude waiter that I gave him ___, telling him exactly how careless he was.","options":["a piece of one's mind","a piece of cake","an arm and a leg","a blessing in disguise"],"answer":0,"explanation":"a piece of one's mind：直言不諱地責備;把不滿說出來。例：When he cut in line, she gave him a piece of her mind.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0269","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"They've sent you the contract, so ___—it's your turn to reply.","options":["it's a piece of cake","you're under the weather","you got cold feet","the ball is in your court"],"answer":3,"explanation":"the ball is in your court：該由你決定或行動了。例：I've made my offer; now the ball is in your court.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0270","type":"grammar","unitGroup":"慣用與生活","unit":"慣用語與諺語","level":3,"difficulty":3,"difficultyScore":0.8,"stem":"If you ___ while studying, you won't really understand the material.","options":["hit the books","take your t
