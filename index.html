dly.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0290","type":"grammar","unitGroup":"慣用與生活","unit":"生活情境常用片語","level":1,"difficulty":1,"difficultyScore":0.2,"stem":"___! Things will get better after this hard week.","options":["show off","cheer up","calm down","give up"],"answer":1,"explanation":"cheer up：使振作;打起精神。例：I brought you some cake to cheer you up.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}},{"id":"GP0291","type":"grammar","unitGroup":"慣用與生活","unit":"生活情境常用片語","level":1,"difficulty":1,"difficultyScore":0.2,"stem":"Everyone has a different ___ about what makes a good movie.","options":["point of view","piece of mind","sense of humor","way of life"],"answer":0,"explanation":"point of view：觀點;看法。例：Try to see the problem from your friend's point of view.","explSource":"ai","flags":{"ocr":false,"answerCheck":"ok"}}],"passages":[],"vocab":[{"id":"V-0001","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"look after","pos":"動詞片語","zh":"照顧、照料","example":"My grandmother looks after our dog while we are at school.","exampleZh":"我們上學時,奶奶會幫忙照顧我們的狗。"},{"id":"V-0002","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"give up","pos":"動詞片語","zh":"放棄","example":"Don't give up now; you are almost at the finish line.","exampleZh":"現在別放棄,你快到終點線了。"},{"id":"V-0003","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"put off","pos":"動詞片語","zh":"拖延、延期","example":"We had to put off the sports day because of the heavy rain.","exampleZh":"因為下大雨,我們只好把運動會延期。"},{"id":"V-0004","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"run out of","pos":"動詞片語","zh":"用完、耗盡","example":"We ran out of milk, so I went to buy some more.","exampleZh":"我們的牛奶用完了,所以我去多買了一些。"},{"id":"V-0005","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"get along with","pos":"動詞片語","zh":"與(某人)相處融洽","example":"She gets along well with all of her classmates.","exampleZh":"她和所有同學都相處得很好。"},{"id":"V-0006","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"look forward to","pos":"動詞片語","zh":"期待、盼望","example":"I'm looking forward to the summer vacation.","exampleZh":"我很期待暑假的到來。"},{"id":"V-0007","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"take care of","pos":"動詞片語","zh":"照顧、處理","example":"You should take care of your health during the exam week.","exampleZh":"考試週期間你應該照顧好自己的健康。"},{"id":"V-0008","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"turn on","pos":"動詞片語","zh":"打開(電器、開關)","example":"It's getting dark; please turn on the light.","exampleZh":"天色變暗了,請打開電燈。"},{"id":"V-0009","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"turn off","pos":"動詞片語","zh":"關掉(電器、開關)","example":"Don't forget to turn off the TV before you go to bed.","exampleZh":"睡覺前別忘了關掉電視。"},{"id":"V-0010","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"pick up","pos":"動詞片語","zh":"接送、撿起、學會","example":"My dad picks me up from school every afternoon.","exampleZh":"我爸爸每天下午都到學校接我。"},{"id":"V-0011","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"find out","pos":"動詞片語","zh":"查明、發現(真相、資訊)","example":"I want to find out how the accident happened.","exampleZh":"我想查明這場意外是怎麼發生的。"},{"id":"V-0012","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"look for","pos":"動詞片語","zh":"尋找","example":"I'm looking for my keys; have you seen them?","exampleZh":"我在找我的鑰匙,你有看到嗎?"},{"id":"V-0013","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"look up","pos":"動詞片語","zh":"查閱(字典、資料)","example":"If you don't know the word, look it up in a dictionary.","exampleZh":"如果你不懂這個字,就去字典裡查。"},{"id":"V-0014","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"look into","pos":"動詞片語","zh":"調查、研究","example":"The police are looking into the cause of the fire.","exampleZh":"警方正在調查這場火災的起因。"},{"id":"V-0015","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"grow up","pos":"動詞片語","zh":"長大、成長","example":"He grew up in a small town near the sea.","exampleZh":"他在海邊的一個小鎮長大。"},{"id":"V-0016","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"get up","pos":"動詞片語","zh":"起床、起身","example":"I usually get up at six thirty on school days.","exampleZh":"上學日我通常六點半起床。"},{"id":"V-0017","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"wake up","pos":"動詞片語","zh":"醒來、叫醒","example":"The loud noise woke me up in the middle of the night.","exampleZh":"那巨大的聲響在半夜把我吵醒。"},{"id":"V-0018","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"put on","pos":"動詞片語","zh":"穿上、戴上","example":"Put on your jacket; it's cold outside.","exampleZh":"穿上你的外套,外面很冷。"},{"id":"V-0019","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"take off","pos":"動詞片語","zh":"脫下;(飛機)起飛","example":"Please take off your shoes before entering the room.","exampleZh":"進房間前請脫掉鞋子。"},{"id":"V-0020","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"give back","pos":"動詞片語","zh":"歸還","example":"Please give back the book you borrowed last week.","exampleZh":"請歸還你上週借的那本書。"},{"id":"V-0021","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"hand in","pos":"動詞片語","zh":"繳交、上繳","example":"You must hand in your homework by Friday.","exampleZh":"你必須在星期五前繳交作業。"},{"id":"V-0022","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"hand out","pos":"動詞片語","zh":"發放、分發","example":"The teacher handed out the test papers to the students.","exampleZh":"老師把考卷發給學生。"},{"id":"V-0023","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"fill in","pos":"動詞片語","zh":"填寫(表格、空格)","example":"Please fill in your name and phone number on the form.","exampleZh":"請在表格上填寫你的姓名和電話。"},{"id":"V-0024","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"throw away","pos":"動詞片語","zh":"丟棄","example":"Don't throw away those bottles; we can recycle them.","exampleZh":"別把那些瓶子丟掉,我們可以回收。"},{"id":"V-0025","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"put away","pos":"動詞片語","zh":"收好、放回原處","example":"After playing, the children put away their toys.","exampleZh":"玩完後,孩子們把玩具收好。"},{"id":"V-0026","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"turn down","pos":"動詞片語","zh":"調小(音量);拒絕","example":"Could you turn down the music? It's too loud.","exampleZh":"你可以把音樂調小聲一點嗎?太大聲了。"},{"id":"V-0027","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"turn up","pos":"動詞片語","zh":"調大(音量);出現","example":"Please turn up the volume; I can't hear the news.","exampleZh":"請把音量調大,我聽不到新聞。"},{"id":"V-0028","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"come from","pos":"動詞片語","zh":"來自、出身於","example":"My new classmate comes from Japan.","exampleZh":"我的新同學來自日本。"},{"id":"V-0029","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"come up with","pos":"動詞片語","zh":"想出、提出(點子)","example":"She came up with a great idea for the school festival.","exampleZh":"她為校慶想出了一個很棒的點子。"},{"id":"V-0030","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"come across","pos":"動詞片語","zh":"偶然遇到、無意間發現","example":"I came across an old photo while cleaning my room.","exampleZh":"我在整理房間時偶然發現一張舊照片。"},{"id":"V-0031","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"depend on","pos":"動詞片語","zh":"依賴、取決於","example":"Whether we go hiking depends on the weather.","exampleZh":"我們是否去健行取決於天氣。"},{"id":"V-0032","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"take part in","pos":"動詞片語","zh":"參加、參與","example":"Many students took part in the speech contest.","exampleZh":"許多學生參加了演講比賽。"},{"id":"V-0033","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"take place","pos":"動詞片語","zh":"發生、舉行","example":"The concert will take place in the city hall.","exampleZh":"這場音樂會將在市政廳舉行。"},{"id":"V-0034","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"pay attention to","pos":"動詞片語","zh":"注意、留意","example":"You should pay attention to the teacher in class.","exampleZh":"上課時你應該注意聽老師講。"},{"id":"V-0035","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"be good at","pos":"動詞片語","zh":"擅長於","example":"My sister is good at playing the piano.","exampleZh":"我姊姊擅長彈鋼琴。"},{"id":"V-0036","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"be interested in","pos":"動詞片語","zh":"對……有興趣","example":"I am interested in learning about space and stars.","exampleZh":"我對學習太空和星星很有興趣。"},{"id":"V-0037","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"be afraid of","pos":"動詞片語","zh":"害怕……","example":"Many children are afraid of the dark.","exampleZh":"許多小孩都怕黑。"},{"id":"V-0038","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"be made of","pos":"動詞片語","zh":"由……製成(看得出原料)","example":"This table is made of wood.","exampleZh":"這張桌子是木頭做的。"},{"id":"V-0039","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"agree with","pos":"動詞片語","zh":"同意(某人)","example":"I agree with you that we should start earlier.","exampleZh":"我同意你的看法,我們應該早點開始。"},{"id":"V-0040","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"break down","pos":"動詞片語","zh":"故障、拋錨;崩潰","example":"Our car broke down on the way to the beach.","exampleZh":"我們的車在往海邊的路上拋錨了。"},{"id":"V-0041","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"break up","pos":"動詞片語","zh":"分手;解散","example":"They broke up after dating for two years.","exampleZh":"他們交往兩年後分手了。"},{"id":"V-0042","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"get on","pos":"動詞片語","zh":"上車(公車、火車、飛機)","example":"We got on the bus and found two empty seats.","exampleZh":"我們上了公車,找到兩個空位。"},{"id":"V-0043","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"get off","pos":"動詞片語","zh":"下車","example":"You should get off the bus at the next stop.","exampleZh":"你應該在下一站下公車。"},{"id":"V-0044","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"get over","pos":"動詞片語","zh":"克服、從……中復原","example":"It took her a month to get over the flu.","exampleZh":"她花了一個月才從流感中康復。"},{"id":"V-0045","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"carry out","pos":"動詞片語","zh":"執行、實行(計畫)","example":"The team worked hard to carry out the plan.","exampleZh":"團隊努力執行這項計畫。"},{"id":"V-0046","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"set up","pos":"動詞片語","zh":"設立、建立、架設","example":"They set up a small shop near the station.","exampleZh":"他們在車站附近開了一家小店。"},{"id":"V-0047","type":"vocab","unitGroup":"片語","unit":"常用動詞片語","level":1,"difficulty":1,"word":"deal with","pos":"動詞片語","zh":"處理、應付","example":"A good leader knows how to deal with problems.","exampleZh":"好的領導者懂得如何處理問題。"},{"id":"V-0048","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"put up with","pos":"動詞片語","zh":"忍受、容忍","example":"I can't put up with his rudeness any longer.","exampleZh":"我再也無法忍受他的無禮了。"},{"id":"V-0049","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"look down on","pos":"動詞片語","zh":"看不起、輕視","example":"You shouldn't look down on people just because they are poor.","exampleZh":"你不該只因為別人貧窮就看不起他們。"},{"id":"V-0050","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"look up to","pos":"動詞片語","zh":"尊敬、敬仰","example":"Many young athletes look up to this legendary player.","exampleZh":"許多年輕運動員都很敬仰這位傳奇球員。"},{"id":"V-0051","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"make up for","pos":"動詞片語","zh":"彌補、補償","example":"He worked overtime to make up for the days he was absent.","exampleZh":"他加班來彌補他請假缺席的日子。"},{"id":"V-0052","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"get rid of","pos":"動詞片語","zh":"擺脫、除掉","example":"It's hard to get rid of a bad habit once it forms.","exampleZh":"壞習慣一旦養成就很難擺脫。"},{"id":"V-0053","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"cut down on","pos":"動詞片語","zh":"減少(用量、攝取)","example":"The doctor advised him to cut down on sugar and salt.","exampleZh":"醫生建議他減少糖和鹽的攝取。"},{"id":"V-0054","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"figure out","pos":"動詞片語","zh":"弄清楚、想通、算出","example":"It took me a while to figure out how the machine works.","exampleZh":"我花了一點時間才弄清楚這台機器怎麼運作。"},{"id":"V-0055","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"take over","pos":"動詞片語","zh":"接管、接手","example":"His son will take over the family business next year.","exampleZh":"他兒子明年將接手家族事業。"},{"id":"V-0056","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"bring about","pos":"動詞片語","zh":"帶來、造成、引發","example":"The new policy brought about many changes in the school.","exampleZh":"這項新政策為學校帶來了許多改變。"},{"id":"V-0057","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"turn out","pos":"動詞片語","zh":"結果是、原來是","example":"The movie turned out to be much better than we expected.","exampleZh":"這部電影結果比我們預期的好看多了。"},{"id":"V-0058","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"call off","pos":"動詞片語","zh":"取消","example":"They had to call off the picnic because of the heavy rain.","exampleZh":"因為大雨，他們只好取消野餐。"},{"id":"V-0059","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"give in","pos":"動詞片語","zh":"讓步、屈服","example":"His parents finally gave in and let him go to the concert.","exampleZh":"他父母最後讓步，讓他去聽演唱會。"},{"id":"V-0060","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"run into","pos":"動詞片語","zh":"偶然遇見；遭遇(困難)","example":"I ran into an old friend at the supermarket yesterday.","exampleZh":"我昨天在超市巧遇一位老朋友。"},{"id":"V-0061","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"take after","pos":"動詞片語","zh":"(長相或個性)像(某長輩)","example":"She takes after her mother in both looks and temper.","exampleZh":"她的長相和脾氣都像她媽媽。"},{"id":"V-0062","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"bring up","pos":"動詞片語","zh":"養育；提出(話題)","example":"She was brought up by her grandparents in the countryside.","exampleZh":"她是由祖父母在鄉下養大的。"},{"id":"V-0063","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"point out","pos":"動詞片語","zh":"指出","example":"The teacher pointed out several mistakes in my essay.","exampleZh":"老師指出了我作文中的幾個錯誤。"},{"id":"V-0064","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"catch up with","pos":"動詞片語","zh":"趕上、追上","example":"If you study hard, you'll soon catch up with the others.","exampleZh":"如果你努力用功，很快就能趕上其他人。"},{"id":"V-0065","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"keep up with","pos":"動詞片語","zh":"跟上、不落後","example":"It's hard to keep up with the latest technology these days.","exampleZh":"如今要跟上最新科技很不容易。"},{"id":"V-0066","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"give away","pos":"動詞片語","zh":"贈送、送出；洩漏","example":"The store gave away free samples to attract customers.","exampleZh":"這家店免費送出試用品以吸引顧客。"},{"id":"V-0067","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"break out","pos":"動詞片語","zh":"(戰爭、火災、疾病)爆發","example":"A fire broke out in the factory late at night.","exampleZh":"深夜工廠發生了火災。"},{"id":"V-0068","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"set off","pos":"動詞片語","zh":"出發；引發、觸發","example":"We set off early in the morning to avoid the traffic.","exampleZh":"我們一大早就出發以避開車潮。"},{"id":"V-0069","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"account for","pos":"動詞片語","zh":"說明、解釋；占(比例)","example":"He couldn't account for the missing money.","exampleZh":"他無法解釋這筆不見的錢的去向。"},{"id":"V-0070","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"call on","pos":"動詞片語","zh":"拜訪；呼籲、要求","example":"The mayor called on citizens to save water during the drought.","exampleZh":"市長呼籲市民在乾旱期間節約用水。"},{"id":"V-0071","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"insist on","pos":"動詞片語","zh":"堅持","example":"He insisted on paying the bill for everyone.","exampleZh":"他堅持要幫大家付帳。"},{"id":"V-0072","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"stand for","pos":"動詞片語","zh":"代表、象徵","example":"The letters UN stand for the United Nations.","exampleZh":"UN 這兩個字母代表聯合國。"},{"id":"V-0073","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"turn to","pos":"動詞片語","zh":"求助於、轉向","example":"When she has a problem, she always turns to her best friend.","exampleZh":"每當遇到問題，她總是向最好的朋友求助。"},{"id":"V-0074","type":"vocab","unitGroup":"片語","unit":"進階動詞片語","level":3,"difficulty":3,"word":"work out","pos":"動詞片語","zh":"解決；鍛鍊；結果順利","example":"I'm sure we can work out a solution together.","exampleZh":"我相信我們能一起想出解決辦法。"},{"id":"V-0075","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be proud of","pos":"形容詞片語","zh":"以……為榮、感到驕傲","example":"My parents are proud of me for winning the speech contest.","exampleZh":"我贏得演講比賽，爸媽以我為榮。"},{"id":"V-0076","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be famous for","pos":"形容詞片語","zh":"以……聞名","example":"Tainan is famous for its delicious traditional snacks.","exampleZh":"台南以美味的傳統小吃聞名。"},{"id":"V-0077","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be worried about","pos":"形容詞片語","zh":"擔心、憂慮","example":"She is worried about her final exam next week.","exampleZh":"她擔心下週的期末考。"},{"id":"V-0078","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be aware of","pos":"形容詞片語","zh":"意識到、察覺到","example":"Drivers should be aware of children crossing the street near schools.","exampleZh":"駕駛人在學校附近應留意過馬路的孩童。"},{"id":"V-0079","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be capable of","pos":"形容詞片語","zh":"有能力做……","example":"With enough practice, you are capable of solving even the hardest problems.","exampleZh":"只要多練習，你有能力解出最難的題目。"},{"id":"V-0080","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be responsible for","pos":"形容詞片語","zh":"對……負責","example":"Each student is responsible for keeping the classroom clean.","exampleZh":"每位學生都要負責維持教室整潔。"},{"id":"V-0081","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be fond of","pos":"形容詞片語","zh":"喜愛、喜歡","example":"My grandmother is fond of gardening and grows many flowers.","exampleZh":"我奶奶喜愛園藝，種了許多花。"},{"id":"V-0082","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be tired of","pos":"形容詞片語","zh":"厭倦、受夠了","example":"I am tired of eating the same lunch every day.","exampleZh":"我厭倦了每天吃一樣的午餐。"},{"id":"V-0083","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be full of","pos":"形容詞片語","zh":"充滿……","example":"The park is full of people on sunny weekends.","exampleZh":"晴朗的週末公園裡擠滿了人。"},{"id":"V-0084","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be similar to","pos":"形容詞片語","zh":"與……相似","example":"This song is similar to one I heard last year.","exampleZh":"這首歌和我去年聽過的一首很像。"},{"id":"V-0085","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be different from","pos":"形容詞片語","zh":"與……不同","example":"Life in the countryside is different from life in the city.","exampleZh":"鄉下的生活和城市的生活不一樣。"},{"id":"V-0086","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be good for","pos":"形容詞片語","zh":"對……有益","example":"Regular exercise is good for your health.","exampleZh":"規律運動對你的健康有益。"},{"id":"V-0087","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be bad for","pos":"形容詞片語","zh":"對……有害","example":"Staying up late is bad for your body.","exampleZh":"熬夜對你的身體有害。"},{"id":"V-0088","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be angry with","pos":"形容詞片語","zh":"對(某人)生氣","example":"My mom was angry with me for coming home late.","exampleZh":"我晚回家，媽媽對我很生氣。"},{"id":"V-0089","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be angry about","pos":"形容詞片語","zh":"對(某事)生氣","example":"The customers were angry about the poor service.","exampleZh":"顧客對差勁的服務感到生氣。"},{"id":"V-0090","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be sorry for","pos":"形容詞片語","zh":"為……感到抱歉、同情","example":"I felt sorry for the lost dog standing in the rain.","exampleZh":"我為那隻站在雨中迷路的狗感到難過。"},{"id":"V-0091","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be good to","pos":"形容詞片語","zh":"對(某人)友善、好","example":"My neighbors have always been good to my family.","exampleZh":"我的鄰居一直對我家人很好。"},{"id":"V-0092","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be kind to","pos":"形容詞片語","zh":"對……親切、善待","example":"We should be kind to animals and never hurt them.","exampleZh":"我們應該善待動物，絕不傷害牠們。"},{"id":"V-0093","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be famous as","pos":"形容詞片語","zh":"以(某身分)著稱","example":"He is famous as a scientist who never stops asking questions.","exampleZh":"他以一位不斷發問的科學家著稱。"},{"id":"V-0094","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be surprised at","pos":"形容詞片語","zh":"對……感到驚訝","example":"We were surprised at how quickly he finished the test.","exampleZh":"他這麼快就寫完考試，我們很驚訝。"},{"id":"V-0095","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be good with","pos":"形容詞片語","zh":"善於應對、和……相處得好","example":"She is good with children, so she makes a great teacher.","exampleZh":"她很會帶小孩，所以是很棒的老師。"},{"id":"V-0096","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be ready for","pos":"形容詞片語","zh":"為……做好準備","example":"Are you ready for the big game this afternoon?","exampleZh":"你準備好迎接今天下午的大賽了嗎?"},{"id":"V-0097","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be used to","pos":"形容詞片語","zh":"習慣於……","example":"After living abroad for years, he is used to speaking English every day.","exampleZh":"在國外住了幾年後，他習慣了每天說英文。"},{"id":"V-0098","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be crowded with","pos":"形容詞片語","zh":"擠滿了……","example":"The night market was crowded with tourists.","exampleZh":"夜市裡擠滿了觀光客。"},{"id":"V-0099","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be made from","pos":"形容詞片語","zh":"由……製成(原料已變質)","example":"Paper is made from trees.","exampleZh":"紙是由樹木製成的。"},{"id":"V-0100","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be covered with","pos":"形容詞片語","zh":"被……覆蓋","example":"In winter, the mountains are covered with snow.","exampleZh":"冬天時，山上被白雪覆蓋。"},{"id":"V-0101","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be absent from","pos":"形容詞片語","zh":"缺席、不在","example":"He was absent from school because of a bad cold.","exampleZh":"他因為重感冒而沒去上學。"},{"id":"V-0102","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be popular with","pos":"形容詞片語","zh":"受……歡迎","example":"This teacher is popular with her students.","exampleZh":"這位老師很受學生歡迎。"},{"id":"V-0103","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be based on","pos":"形容詞片語","zh":"以……為基礎、根據","example":"The movie is based on a true story.","exampleZh":"這部電影根據真實故事改編。"},{"id":"V-0104","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be busy with","pos":"形容詞片語","zh":"忙於……","example":"She is busy with her science project this week.","exampleZh":"她這週忙著做科學報告。"},{"id":"V-0105","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be worried for","pos":"形容詞片語","zh":"為(某人)擔心","example":"We are worried for the hikers lost in the mountains.","exampleZh":"我們為在山中迷路的登山客擔心。"},{"id":"V-0106","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be pleased with","pos":"形容詞片語","zh":"對……感到滿意、高興","example":"The teacher was pleased with our performance.","exampleZh":"老師對我們的表現感到滿意。"},{"id":"V-0107","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be satisfied with","pos":"形容詞片語","zh":"對……滿意","example":"Customers are satisfied with the quality of the products.","exampleZh":"顧客對產品的品質感到滿意。"},{"id":"V-0108","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be worth","pos":"形容詞片語","zh":"值得(接名詞或V-ing)","example":"This museum is worth visiting when you travel to Taipei.","exampleZh":"到台北旅遊時，這座博物館值得一看。"},{"id":"V-0109","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be typical of","pos":"形容詞片語","zh":"是……的典型、典型代表","example":"Heavy rain in the afternoon is typical of summer in Taiwan.","exampleZh":"午後大雨是台灣夏天的典型天氣。"},{"id":"V-0110","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be suitable for","pos":"形容詞片語","zh":"適合……","example":"This movie is suitable for children of all ages.","exampleZh":"這部電影適合各年齡的孩童觀看。"},{"id":"V-0111","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be curious about","pos":"形容詞片語","zh":"對……好奇","example":"Kids are curious about how things work.","exampleZh":"孩子們對事物如何運作感到好奇。"},{"id":"V-0112","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be jealous of","pos":"形容詞片語","zh":"嫉妒","example":"He was jealous of his friend's new bike.","exampleZh":"他嫉妒朋友的新腳踏車。"},{"id":"V-0113","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be confident of","pos":"形容詞片語","zh":"對……有信心","example":"She is confident of passing the entrance exam.","exampleZh":"她有信心通過入學考試。"},{"id":"V-0114","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be dependent on","pos":"形容詞片語","zh":"依賴、取決於","example":"Young children are dependent on their parents.","exampleZh":"幼小的孩子依賴父母。"},{"id":"V-0115","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be ashamed of","pos":"形容詞片語","zh":"為……感到羞愧","example":"He was ashamed of lying to his parents.","exampleZh":"他為對父母說謊感到羞愧。"},{"id":"V-0116","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be sure of","pos":"形容詞片語","zh":"確信、有把握","example":"I am sure of my answer to the last question.","exampleZh":"我對最後一題的答案很有把握。"},{"id":"V-0117","type":"vocab","unitGroup":"片語","unit":"形容詞+介系詞","level":1,"difficulty":1,"word":"be excited about","pos":"形容詞片語","zh":"對……感到興奮、期待","example":"The students are excited about the school trip next week.","exampleZh":"學生們對下週的校外教學感到興奮。"},{"id":"V-0118","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in charge of","pos":"介系詞片語","zh":"負責、掌管","example":"Ms. Lin is in charge of the school library this semester.","exampleZh":"林老師這學期負責管理學校圖書館。"},{"id":"V-0119","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"on purpose","pos":"介系詞片語","zh":"故意地","example":"I didn't break the vase on purpose; it was an accident.","exampleZh":"我不是故意打破花瓶的，那是意外。"},{"id":"V-0120","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"by accident","pos":"介系詞片語","zh":"意外地、偶然地","example":"I met my old classmate by accident at the train station.","exampleZh":"我在火車站偶然遇見了老同學。"},{"id":"V-0121","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in danger of","pos":"介系詞片語","zh":"有…的危險","example":"Many wild animals are in danger of extinction because of pollution.","exampleZh":"許多野生動物因污染而面臨滅絕的危險。"},{"id":"V-0122","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in advance","pos":"介系詞片語","zh":"事先、預先","example":"Please book the tickets in advance so we can get better seats.","exampleZh":"請事先訂票，這樣我們能坐到比較好的位子。"},{"id":"V-0123","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"on time","pos":"介系詞片語","zh":"準時","example":"The train arrived on time, so we didn't miss our connection.","exampleZh":"火車準時抵達，所以我們沒錯過轉車。"},{"id":"V-0124","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in time","pos":"介系詞片語","zh":"及時、來得及","example":"We got to the airport just in time to catch our flight.","exampleZh":"我們及時趕到機場，剛好趕上班機。"},{"id":"V-0125","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"at least","pos":"介系詞片語","zh":"至少","example":"You should sleep at least eight hours a day to stay healthy.","exampleZh":"你每天至少要睡八小時才能保持健康。"},{"id":"V-0126","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"at most","pos":"介系詞片語","zh":"至多、最多","example":"The whole test will take an hour at most, so don't worry.","exampleZh":"整場考試最多只需一小時，別擔心。"},{"id":"V-0127","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in general","pos":"介系詞片語","zh":"一般而言、通常","example":"In general, students in this school do well in English.","exampleZh":"一般而言，這所學校的學生英文表現不錯。"},{"id":"V-0128","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"for the sake of","pos":"介系詞片語","zh":"為了…的緣故","example":"She gave up the job in the city for the sake of her family.","exampleZh":"她為了家人放棄了城市裡的工作。"},{"id":"V-0129","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in terms of","pos":"介系詞片語","zh":"就…而言、在…方面","example":"In terms of price, this phone is the best choice for students.","exampleZh":"就價格而言，這支手機是學生最好的選擇。"},{"id":"V-0130","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"on behalf of","pos":"介系詞片語","zh":"代表…","example":"On behalf of our class, I want to thank you for your help.","exampleZh":"我代表全班，感謝您的幫忙。"},{"id":"V-0131","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in favor of","pos":"介系詞片語","zh":"贊成、支持","example":"Most students are in favor of a longer lunch break.","exampleZh":"大多數學生贊成延長午休時間。"},{"id":"V-0132","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in need of","pos":"介系詞片語","zh":"需要","example":"After the earthquake, many families were in need of food and water.","exampleZh":"地震後，許多家庭需要食物和水。"},{"id":"V-0133","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in spite of","pos":"介系詞片語","zh":"儘管、不顧","example":"In spite of the heavy rain, they still went hiking.","exampleZh":"儘管下著大雨，他們還是去健行了。"},{"id":"V-0134","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"because of","pos":"介系詞片語","zh":"因為、由於","example":"The game was canceled because of the storm.","exampleZh":"比賽因暴風雨而取消。"},{"id":"V-0135","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"instead of","pos":"介系詞片語","zh":"而不是、代替","example":"Let's take the bus instead of walking in this heat.","exampleZh":"這麼熱，我們搭公車吧，別用走的。"},{"id":"V-0136","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"by means of","pos":"介系詞片語","zh":"藉由、透過","example":"People share ideas by means of the Internet every day.","exampleZh":"人們每天透過網路分享想法。"},{"id":"V-0137","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in front of","pos":"介系詞片語","zh":"在…前面","example":"A tall tree stands in front of our house.","exampleZh":"我們家前面有一棵高大的樹。"},{"id":"V-0138","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in the middle of","pos":"介系詞片語","zh":"在…中間、正在…當中","example":"The phone rang in the middle of the movie.","exampleZh":"電影演到一半時電話響了。"},{"id":"V-0139","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"at the end of","pos":"介系詞片語","zh":"在…的盡頭、最後","example":"The library is at the end of this hallway.","exampleZh":"圖書館在這條走廊的盡頭。"},{"id":"V-0140","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in the end","pos":"介系詞片語","zh":"最後、終於","example":"They argued for hours, but in the end they reached an agreement.","exampleZh":"他們爭論了好幾個小時，但最後達成了共識。"},{"id":"V-0141","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"at first","pos":"介系詞片語","zh":"起初、一開始","example":"At first the math seemed hard, but later it became easy.","exampleZh":"起初數學看起來很難，後來就變簡單了。"},{"id":"V-0142","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"at last","pos":"介系詞片語","zh":"終於","example":"After a long trip, we arrived home at last.","exampleZh":"經過漫長的旅程，我們終於到家了。"},{"id":"V-0143","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"at once","pos":"介系詞片語","zh":"立刻、馬上","example":"The teacher told us to sit down at once.","exampleZh":"老師叫我們馬上坐下。"},{"id":"V-0144","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in common","pos":"介系詞片語","zh":"共同的、相似的","example":"The two sisters have a lot in common, including their love of music.","exampleZh":"這對姊妹有很多共同點，包括對音樂的熱愛。"},{"id":"V-0145","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in particular","pos":"介系詞片語","zh":"尤其、特別是","example":"I enjoy all sports, tennis in particular.","exampleZh":"我喜歡所有運動，尤其是網球。"},{"id":"V-0146","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in public","pos":"介系詞片語","zh":"公開地、當眾","example":"He was too shy to sing in public.","exampleZh":"他太害羞了，不敢當眾唱歌。"},{"id":"V-0147","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in private","pos":"介系詞片語","zh":"私下地","example":"The teacher spoke to the student in private after class.","exampleZh":"下課後老師私下和那名學生談話。"},{"id":"V-0148","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"on sale","pos":"介系詞片語","zh":"特價、拍賣中","example":"These shoes are on sale this week, so let's buy a pair.","exampleZh":"這雙鞋這週特價，我們買一雙吧。"},{"id":"V-0149","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"for sale","pos":"介系詞片語","zh":"待售、供出售","example":"The house across the street is for sale.","exampleZh":"對街那棟房子正在出售。"},{"id":"V-0150","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"on foot","pos":"介系詞片語","zh":"步行","example":"The school is close, so I go there on foot every day.","exampleZh":"學校很近，所以我每天走路去。"},{"id":"V-0151","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in cash","pos":"介系詞片語","zh":"用現金","example":"Can I pay in cash, or do you only take cards?","exampleZh":"我可以付現金嗎，還是你們只收卡?"},{"id":"V-0152","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"out of order","pos":"介系詞片語","zh":"故障、壞掉","example":"The elevator is out of order, so we have to use the stairs.","exampleZh":"電梯故障了，所以我們得走樓梯。"},{"id":"V-0153","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"out of date","pos":"介系詞片語","zh":"過時的、過期的","example":"This map is out of date; many new roads are missing.","exampleZh":"這張地圖過時了，少了許多新的道路。"},{"id":"V-0154","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in a hurry","pos":"介系詞片語","zh":"匆忙、趕時間","example":"She left in a hurry and forgot her umbrella.","exampleZh":"她匆匆離開，忘了帶傘。"},{"id":"V-0155","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"by mistake","pos":"介系詞片語","zh":"錯誤地、不小心","example":"I took your pen by mistake; here it is.","exampleZh":"我不小心拿了你的筆，還你。"},{"id":"V-0156","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in order to","pos":"連接片語","zh":"為了(做…)","example":"She got up early in order to catch the first bus.","exampleZh":"她早起是為了趕搭第一班公車。"},{"id":"V-0157","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"as a result of","pos":"介系詞片語","zh":"由於…的結果","example":"As a result of the typhoon, all flights were canceled.","exampleZh":"由於颱風的緣故，所有航班都取消了。"},{"id":"V-0158","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in addition to","pos":"介系詞片語","zh":"除了…之外(還)","example":"In addition to English, she can speak French and Japanese.","exampleZh":"除了英文，她還會說法文和日文。"},{"id":"V-0159","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"thanks to","pos":"介系詞片語","zh":"多虧、幸虧","example":"Thanks to your help, I finished the project on time.","exampleZh":"多虧你的幫忙，我準時完成了專案。"},{"id":"V-0160","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"at the same time","pos":"介系詞片語","zh":"同時","example":"You can't watch TV and study well at the same time.","exampleZh":"你沒辦法同時看電視又好好讀書。"},{"id":"V-0161","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in the future","pos":"介系詞片語","zh":"在未來","example":"In the future, more people may drive electric cars.","exampleZh":"未來，可能會有更多人開電動車。"},{"id":"V-0162","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"for example","pos":"連接片語","zh":"舉例來說","example":"Many animals sleep in winter; bears, for example, hibernate for months.","exampleZh":"許多動物在冬天睡覺，例如熊會冬眠好幾個月。"},{"id":"V-0163","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"on the other hand","pos":"連接片語","zh":"另一方面","example":"The city is exciting; on the other hand, it can be very noisy.","exampleZh":"城市很刺激，但另一方面也可能很吵。"},{"id":"V-0164","type":"vocab","unitGroup":"片語","unit":"介系詞與名詞片語","level":2,"difficulty":2,"word":"in return","pos":"介系詞片語","zh":"作為回報","example":"She helped me with my homework, and I bought her lunch in return.","exampleZh":"她幫我做功課，我請她吃午餐作為回報。"},{"id":"V-0165","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"as a result","pos":"連接片語","zh":"結果;因此","example":"He didn't study hard, and as a result, he failed the exam.","exampleZh":"他不用功,結果考試不及格。"},{"id":"V-0166","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"in addition","pos":"連接片語","zh":"此外;另外","example":"The hotel is clean. In addition, it is very close to the station.","exampleZh":"這間旅館很乾淨。此外,它離車站很近。"},{"id":"V-0167","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"in other words","pos":"連接片語","zh":"換句話說","example":"He is a man of few words; in other words, he doesn't talk much.","exampleZh":"他話很少;換句話說,他不太愛講話。"},{"id":"V-0168","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"in conclusion","pos":"連接片語","zh":"總而言之;最後","example":"In conclusion, reading every day helps us learn new words.","exampleZh":"總而言之,每天閱讀能幫助我們學習新單字。"},{"id":"V-0169","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"above all","pos":"連接片語","zh":"最重要的是","example":"Above all, remember to stay calm during the test.","exampleZh":"最重要的是,考試時記得保持冷靜。"},{"id":"V-0170","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"what is more","pos":"連接片語","zh":"而且;更甚者","example":"The trip was cheap, and what is more, we had a wonderful time.","exampleZh":"這趟旅行很便宜,而且我們玩得很愉快。"},{"id":"V-0171","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"in contrast","pos":"連接片語","zh":"相較之下;相反地","example":"My brother is quiet. In contrast, my sister loves to talk.","exampleZh":"我哥哥很安靜。相較之下,我姐姐很愛講話。"},{"id":"V-0172","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"due to","pos":"介系詞片語","zh":"由於","example":"The game was canceled due to the heavy rain.","exampleZh":"比賽因為大雨而取消了。"},{"id":"V-0173","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"according to","pos":"介系詞片語","zh":"根據","example":"According to the news, it will be sunny tomorrow.","exampleZh":"根據新聞,明天會是晴天。"},{"id":"V-0174","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"for instance","pos":"連接片語","zh":"舉例來說","example":"Some animals sleep in winter; for instance, bears hibernate.","exampleZh":"有些動物在冬天睡覺;舉例來說,熊會冬眠。"},{"id":"V-0175","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"in fact","pos":"連接片語","zh":"事實上","example":"The test looked hard, but in fact, it was quite easy.","exampleZh":"考試看起來很難,但事實上相當容易。"},{"id":"V-0176","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"on the contrary","pos":"連接片語","zh":"相反地","example":"I'm not tired at all; on the contrary, I feel full of energy.","exampleZh":"我一點也不累;相反地,我覺得精力充沛。"},{"id":"V-0177","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"as well as","pos":"連接片語","zh":"以及;還有","example":"She can speak English as well as Japanese.","exampleZh":"她會說英語以及日語。"},{"id":"V-0178","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"in short","pos":"連接片語","zh":"簡言之","example":"In short, hard work is the key to success.","exampleZh":"簡言之,努力是成功的關鍵。"},{"id":"V-0179","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"first of all","pos":"連接片語","zh":"首先","example":"First of all, I would like to thank my parents.","exampleZh":"首先,我要感謝我的父母。"},{"id":"V-0180","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"last but not least","pos":"連接片語","zh":"最後但同樣重要的","example":"Last but not least, don't forget to bring your umbrella.","exampleZh":"最後但同樣重要的是,別忘了帶傘。"},{"id":"V-0181","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"by contrast","pos":"連接片語","zh":"相比之下","example":"The first plan was risky. By contrast, the second one was safe.","exampleZh":"第一個計畫很冒險。相比之下,第二個很安全。"},{"id":"V-0182","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"as a matter of fact","pos":"連接片語","zh":"事實上","example":"As a matter of fact, I have never been to Japan.","exampleZh":"事實上,我從來沒去過日本。"},{"id":"V-0183","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"as long as","pos":"連接片語","zh":"只要","example":"You can succeed as long as you keep trying.","exampleZh":"只要你持續努力,就能成功。"},{"id":"V-0184","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"as soon as","pos":"連接片語","zh":"一...就...","example":"I will call you as soon as I get home.","exampleZh":"我一到家就會打給你。"},{"id":"V-0185","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"so that","pos":"連接片語","zh":"以便;為了","example":"She spoke slowly so that everyone could understand.","exampleZh":"她說得很慢,好讓大家都能聽懂。"},{"id":"V-0186","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"such as","pos":"介系詞片語","zh":"例如;像是","example":"I enjoy team sports such as basketball and soccer.","exampleZh":"我喜歡團隊運動,例如籃球和足球。"},{"id":"V-0187","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"more importantly","pos":"連接片語","zh":"更重要的是","example":"The plan is cheap, and more importantly, it is safe.","exampleZh":"這個計畫很便宜,更重要的是,它很安全。"},{"id":"V-0188","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"on top of that","pos":"連接片語","zh":"除此之外","example":"The movie was boring, and on top of that, the seats were uncomfortable.","exampleZh":"那部電影很無聊,除此之外,座位也不舒服。"},{"id":"V-0189","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"after all","pos":"連接片語","zh":"畢竟","example":"Don't be too hard on him; he is only a child, after all.","exampleZh":"別對他太嚴厲;畢竟他只是個孩子。"},{"id":"V-0190","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"as a consequence","pos":"連接片語","zh":"因此;結果","example":"He broke the rules and, as a consequence, was punished.","exampleZh":"他違反了規定,因此受到處罰。"},{"id":"V-0191","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"to begin with","pos":"連接片語","zh":"首先;一開始","example":"To begin with, we need to decide on a topic.","exampleZh":"首先,我們需要決定一個主題。"},{"id":"V-0192","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"in the same way","pos":"連接片語","zh":"同樣地","example":"Plants need water to grow; in the same way, we need food to live.","exampleZh":"植物需要水才能生長;同樣地,我們需要食物才能生存。"},{"id":"V-0193","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"for this reason","pos":"連接片語","zh":"基於這個原因","example":"The road is dangerous; for this reason, we drive slowly.","exampleZh":"這條路很危險;基於這個原因,我們開得很慢。"},{"id":"V-0194","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"needless to say","pos":"連接片語","zh":"不用說;當然","example":"Needless to say, everyone was excited about the holiday.","exampleZh":"不用說,大家都對假期感到興奮。"},{"id":"V-0195","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"to make matters worse","pos":"連接片語","zh":"更糟的是","example":"We got lost, and to make matters worse, my phone died.","exampleZh":"我們迷路了,更糟的是,我的手機沒電了。"},{"id":"V-0196","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"compared with","pos":"介系詞片語","zh":"與...相比","example":"Compared with last year, the weather is much colder now.","exampleZh":"與去年相比,現在的天氣冷多了。"},{"id":"V-0197","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"as mentioned above","pos":"連接片語","zh":"如上所述","example":"As mentioned above, exercise is good for both body and mind.","exampleZh":"如上所述,運動對身心都有益。"},{"id":"V-0198","type":"vocab","unitGroup":"片語","unit":"連接與轉折片語","level":2,"difficulty":2,"word":"besides","pos":"連接片語","zh":"此外;而且","example":"I don't want to go out; besides, it's raining.","exampleZh":"我不想出門;而且,外面正在下雨。"},{"id":"V-0199","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"from now on","pos":"副詞片語","zh":"從現在起、今後","example":"From now on, I will study English for thirty minutes every day.","exampleZh":"從現在起，我每天都會念三十分鐘的英文。"},{"id":"V-0200","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"sooner or later","pos":"副詞片語","zh":"遲早、早晚","example":"If you keep telling lies, sooner or later people will stop trusting you.","exampleZh":"如果你一直說謊，別人遲早會不再信任你。"},{"id":"V-0201","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"once in a while","pos":"副詞片語","zh":"偶爾","example":"We eat out once in a while, usually on my mom's birthday.","exampleZh":"我們偶爾會出去吃飯，通常是在我媽生日的時候。"},{"id":"V-0202","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"from time to time","pos":"副詞片語","zh":"不時、偶爾","example":"From time to time, my grandmother sends me handwritten letters.","exampleZh":"我奶奶不時會寄手寫信給我。"},{"id":"V-0203","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"all of a sudden","pos":"副詞片語","zh":"突然、冷不防","example":"We were walking home when all of a sudden it started to rain.","exampleZh":"我們正走路回家，突然下起雨來。"},{"id":"V-0204","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"more or less","pos":"慣用語","zh":"大約、差不多","example":"The homework is more or less finished; I just need to check it.","exampleZh":"作業差不多做完了，我只需要檢查一下。"},{"id":"V-0205","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"day by day","pos":"副詞片語","zh":"一天天地、逐日","example":"Day by day, her English is getting better.","exampleZh":"她的英文一天天地進步。"},{"id":"V-0206","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"little by little","pos":"副詞片語","zh":"一點一點地、逐漸","example":"Little by little, he saved enough money to buy a bike.","exampleZh":"他一點一點地存夠了錢買腳踏車。"},{"id":"V-0207","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"for good","pos":"慣用語","zh":"永遠、從此不再","example":"After the accident, he quit riding motorcycles for good.","exampleZh":"出事之後，他從此再也不騎機車了。"},{"id":"V-0208","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"in no time","pos":"慣用語","zh":"立刻、很快地","example":"If we take the MRT, we'll get there in no time.","exampleZh":"如果我們搭捷運，很快就會到了。"},{"id":"V-0209","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"now and then","pos":"副詞片語","zh":"偶爾、有時","example":"Now and then, we visit our old teacher to say hello.","exampleZh":"我們偶爾會去探望以前的老師打聲招呼。"},{"id":"V-0210","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"all the time","pos":"副詞片語","zh":"一直、總是","example":"My little brother asks questions all the time.","exampleZh":"我弟弟總是不停地問問題。"},{"id":"V-0211","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"right away","pos":"副詞片語","zh":"立刻、馬上","example":"When the alarm rang, everyone left the building right away.","exampleZh":"警報一響，大家立刻離開了大樓。"},{"id":"V-0212","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"in the long run","pos":"慣用語","zh":"長遠來看、最終","example":"Studying hard now will pay off in the long run.","exampleZh":"現在努力用功，長遠來看是會有回報的。"},{"id":"V-0213","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"for the time being","pos":"慣用語","zh":"暫時、目前","example":"For the time being, we'll stay at my aunt's house.","exampleZh":"我們暫時會住在阿姨家。"},{"id":"V-0214","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"once and for all","pos":"慣用語","zh":"一勞永逸地、徹底地","example":"Let's solve this problem once and for all so it never happens again.","exampleZh":"我們把這個問題徹底解決，讓它不再發生。"},{"id":"V-0215","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"again and again","pos":"副詞片語","zh":"一再地、反覆地、屢次","example":"I told him again and again to be careful, but he didn't listen.","exampleZh":"我一再地叫他小心，但他就是不聽。"},{"id":"V-0216","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"step by step","pos":"副詞片語","zh":"逐步地、一步一步地","example":"The teacher explained the math problem step by step.","exampleZh":"老師一步一步地講解這道數學題。"},{"id":"V-0217","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"as usual","pos":"副詞片語","zh":"像往常一樣、照例","example":"As usual, she was the first one to arrive at the classroom.","exampleZh":"像往常一樣，她是第一個到教室的人。"},{"id":"V-0218","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"ahead of time","pos":"副詞片語","zh":"提前、事先","example":"We arrived at the station ahead of time to catch the early train.","exampleZh":"我們提前到車站，好趕上早班火車。"},{"id":"V-0219","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"at present","pos":"介系詞片語","zh":"目前、現在","example":"At present, she is studying abroad in Japan.","exampleZh":"目前她正在日本留學。"},{"id":"V-0220","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"these days","pos":"副詞片語","zh":"最近、如今","example":"These days, most students carry smartphones.","exampleZh":"如今大多數學生都帶著智慧型手機。"},{"id":"V-0221","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"more and more","pos":"副詞片語","zh":"越來越（多）","example":"More and more people are learning to cook at home.","exampleZh":"越來越多人開始學在家做菜。"},{"id":"V-0222","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"so far","pos":"副詞片語","zh":"到目前為止","example":"So far, the plan is working well.","exampleZh":"到目前為止，這個計畫進行得很順利。"},{"id":"V-0223","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"to some extent","pos":"慣用語","zh":"在某種程度上","example":"To some extent, I agree with your opinion.","exampleZh":"在某種程度上，我同意你的看法。"},{"id":"V-0224","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"for a while","pos":"介系詞片語","zh":"一陣子、暫時","example":"Let's rest for a while before we continue.","exampleZh":"我們先休息一下再繼續。"},{"id":"V-0225","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"all at once","pos":"副詞片語","zh":"突然；同時一起","example":"All at once, the lights went out and the room turned dark.","exampleZh":"突然間，燈全滅了，房間陷入一片黑暗。"},{"id":"V-0226","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"before long","pos":"副詞片語","zh":"不久之後、很快","example":"Be patient; before long, spring will come.","exampleZh":"耐心點，不久之後春天就會來臨。"},{"id":"V-0227","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"year after year","pos":"副詞片語","zh":"年復一年","example":"Year after year, the swallows return to the same rooftop.","exampleZh":"年復一年，燕子回到同一個屋頂。"},{"id":"V-0228","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"by now","pos":"介系詞片語","zh":"到現在、如今","example":"She left an hour ago, so she should be home by now.","exampleZh":"她一小時前就走了，現在應該到家了。"},{"id":"V-0229","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"as soon as possible","pos":"慣用語","zh":"儘快","example":"Please reply to my email as soon as possible.","exampleZh":"請儘快回覆我的電子郵件。"},{"id":"V-0230","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"at times","pos":"副詞片語","zh":"有時、偶爾","example":"At times, I feel nervous before a big test.","exampleZh":"有時候大考前我會覺得緊張。"},{"id":"V-0231","type":"vocab","unitGroup":"片語","unit":"時間頻率與程度片語","level":2,"difficulty":2,"word":"to a great extent","pos":"慣用語","zh":"在很大程度上","example":"To a great extent, our success depends on teamwork.","exampleZh":"在很大程度上，我們的成功取決於團隊合作。"},{"id":"V-0232","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"a piece of cake","pos":"慣用語","zh":"輕而易舉的事;小菜一碟","example":"The math test was a piece of cake because I had studied hard all week.","exampleZh":"這次數學考試輕而易舉,因為我整個禮拜都很用功。"},{"id":"V-0233","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"break the ice","pos":"慣用語","zh":"打破僵局;破冰(緩和陌生氣氛)","example":"To break the ice, the new teacher asked each student to share a funny story.","exampleZh":"為了打破僵局,新老師請每位學生分享一個有趣的故事。"},{"id":"V-0234","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"once in a blue moon","pos":"慣用語","zh":"千載難逢;極少發生","example":"My cousin lives abroad, so we only see each other once in a blue moon.","exampleZh":"我表哥住在國外,所以我們難得才見一次面。"},{"id":"V-0235","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"under the weather","pos":"慣用語","zh":"身體不舒服;不太對勁","example":"I'm feeling a bit under the weather today, so I'll stay home and rest.","exampleZh":"我今天覺得有點不舒服,所以會待在家休息。"},{"id":"V-0236","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"keep an eye on","pos":"動詞片語","zh":"看顧;留意;盯著","example":"Could you keep an eye on my bag while I go to the restroom?","exampleZh":"我去洗手間時,你可以幫我看一下包包嗎?"},{"id":"V-0237","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"make up one's mind","pos":"動詞片語","zh":"下定決心;做出決定","example":"After thinking for days, Amy finally made up her mind to study abroad.","exampleZh":"想了好幾天後,Amy 終於下定決心要出國念書。"},{"id":"V-0238","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"get cold feet","pos":"慣用語","zh":"臨陣退縮;突然膽怯","example":"He wanted to give a speech, but he got cold feet at the last minute.","exampleZh":"他本來想上台演講,卻在最後一刻臨陣退縮了。"},{"id":"V-0239","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"hit the road","pos":"慣用語","zh":"出發;上路","example":"It's getting late, so we'd better hit the road before the traffic gets worse.","exampleZh":"時間不早了,我們最好在塞車變嚴重前趕快上路。"},{"id":"V-0240","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"pull one's leg","pos":"動詞片語","zh":"開某人玩笑;逗某人","example":"Don't take it seriously—he's just pulling your leg.","exampleZh":"別當真,他只是在跟你開玩笑。"},{"id":"V-0241","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"better late than never","pos":"諺語","zh":"遲到總比不到好;亡羊補牢","example":"You finally started exercising at fifty—well, better late than never.","exampleZh":"你五十歲才開始運動,不過遲做總比不做好。"},{"id":"V-0242","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"rain or shine","pos":"慣用語","zh":"風雨無阻;不論晴雨","example":"The mailman delivers letters every day, rain or shine.","exampleZh":"郵差每天送信,風雨無阻。"},{"id":"V-0243","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"cost an arm and a leg","pos":"慣用語","zh":"花大錢;所費不貲","example":"That brand-new smartphone costs an arm and a leg.","exampleZh":"那支全新的智慧型手機貴得要命。"},{"id":"V-0244","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"hit the books","pos":"動詞片語","zh":"用功讀書;開始苦讀","example":"Final exams are next week, so it's time to hit the books.","exampleZh":"下週就是期末考,是時候該用功讀書了。"},{"id":"V-0245","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"call it a day","pos":"動詞片語","zh":"今天到此為止;收工","example":"We've worked for ten hours; let's call it a day.","exampleZh":"我們已經工作十個小時了,今天就到此為止吧。"},{"id":"V-0246","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"let the cat out of the bag","pos":"慣用語","zh":"不小心洩漏秘密","example":"We planned a surprise party, but Tom let the cat out of the bag.","exampleZh":"我們計劃辦驚喜派對,但 Tom 不小心把秘密說溜嘴了。"},{"id":"V-0247","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"a blessing in disguise","pos":"慣用語","zh":"因禍得福;塞翁失馬","example":"Losing that job turned out to be a blessing in disguise; I found a better one.","exampleZh":"丟掉那份工作反而是因禍得福,我找到了更好的工作。"},{"id":"V-0248","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"practice makes perfect","pos":"諺語","zh":"熟能生巧","example":"Don't give up on the piano—practice makes perfect.","exampleZh":"別放棄彈鋼琴,熟能生巧。"},{"id":"V-0249","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"actions speak louder than words","pos":"諺語","zh":"行動勝於言語","example":"He keeps promising to help, but actions speak louder than words.","exampleZh":"他一直說要幫忙,但行動勝於言語。"},{"id":"V-0250","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"kill two birds with one stone","pos":"慣用語","zh":"一石二鳥;一舉兩得","example":"By biking to school, I exercise and save money—killing two birds with one stone.","exampleZh":"騎腳踏車上學讓我既能運動又能省錢,真是一舉兩得。"},{"id":"V-0251","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"when in Rome, do as the Romans do","pos":"諺語","zh":"入境隨俗","example":"In Japan, I bow when greeting people—when in Rome, do as the Romans do.","exampleZh":"在日本我用鞠躬打招呼,入境隨俗嘛。"},{"id":"V-0252","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"every cloud has a silver lining","pos":"諺語","zh":"否極泰來;黑暗中總有希望","example":"You failed once, but every cloud has a silver lining—you learned a lot.","exampleZh":"你雖然失敗過一次,但否極泰來,你學到了很多。"},{"id":"V-0253","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"the early bird catches the worm","pos":"諺語","zh":"早起的鳥兒有蟲吃;先下手為強","example":"She arrived first and got the best seat—the early bird catches the worm.","exampleZh":"她最早到,搶到了最好的位子,真是早起的鳥兒有蟲吃。"},{"id":"V-0254","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"don't judge a book by its cover","pos":"諺語","zh":"別以貌取人","example":"He looks tough but is very kind—don't judge a book by its cover.","exampleZh":"他看起來很兇但其實很善良,別以貌取人。"},{"id":"V-0255","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"easier said than done","pos":"慣用語","zh":"說起來容易做起來難","example":"Saving money every month is easier said than done.","exampleZh":"每個月存錢說起來容易做起來難。"},{"id":"V-0256","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"look on the bright side","pos":"動詞片語","zh":"往好處想;樂觀看待","example":"You lost the game, but look on the bright side—you made new friends.","exampleZh":"你雖然輸了比賽,但往好處想,你交到了新朋友。"},{"id":"V-0257","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"keep one's word","pos":"動詞片語","zh":"遵守諾言;信守承諾","example":"A good leader always keeps his word.","exampleZh":"一個好的領導者總是信守承諾。"},{"id":"V-0258","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"lose one's temper","pos":"動詞片語","zh":"發脾氣;動怒","example":"Try not to lose your temper when you disagree with others.","exampleZh":"當你和別人意見不合時,盡量別發脾氣。"},{"id":"V-0259","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"take one's time","pos":"動詞片語","zh":"慢慢來;不用急","example":"There's no rush; take your time to finish the drawing.","exampleZh":"別急,慢慢把畫完成。"},{"id":"V-0260","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"face the music","pos":"慣用語","zh":"面對現實;承擔後果","example":"He broke the window, so now he has to face the music.","exampleZh":"他打破了窗戶,現在得承擔後果。"},{"id":"V-0261","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"save for a rainy day","pos":"慣用語","zh":"未雨綢繆;存錢以備不時之需","example":"My grandma always tells me to save some money for a rainy day.","exampleZh":"我奶奶總是叫我存點錢以備不時之需。"},{"id":"V-0262","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"bite off more than one can chew","pos":"慣用語","zh":"貪多嚼不爛;不自量力","example":"He joined five clubs and bit off more than he could chew.","exampleZh":"他參加了五個社團,結果貪多嚼不爛。"},{"id":"V-0263","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"so far so good","pos":"慣用語","zh":"到目前為止一切順利","example":"How's the new project going? So far so good.","exampleZh":"新專案進行得如何?到目前為止一切順利。"},{"id":"V-0264","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"no pain, no gain","pos":"諺語","zh":"一分耕耘,一分收穫;沒有付出就沒有收穫","example":"Training is tough, but no pain, no gain.","exampleZh":"訓練很辛苦,但沒有付出就沒有收穫。"},{"id":"V-0265","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"where there's a will, there's a way","pos":"諺語","zh":"有志者事竟成","example":"She learned to walk again after the accident—where there's a will, there's a way.","exampleZh":"她在意外後重新學會走路,真是有志者事竟成。"},{"id":"V-0266","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"it's never too late to learn","pos":"諺語","zh":"學習永遠不嫌晚;活到老學到老","example":"My father started learning English at sixty—it's never too late to learn.","exampleZh":"我爸六十歲才開始學英文,學習永遠不嫌晚。"},{"id":"V-0267","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"in the same boat","pos":"慣用語","zh":"處境相同;同病相憐","example":"We all failed the quiz, so we're in the same boat.","exampleZh":"我們這次小考都不及格,大家處境相同。"},{"id":"V-0268","type":"vocab","unitGroup":"片語","unit":"慣用語與諺語","level":3,"difficulty":3,"word":"a piece of one function sched(card,grade){ // grade: 'again'|'good'|'easy'
  card.ease=card.ease||2.4; card.reps=card.reps||0; card.lapses=card.lapses||0;
  if(grade==='again'){card.lapses++;card.reps=0;card.ease=Math.max(1.3,card.ease-0.2);card.interval=0;}
  else{ if(card.reps===0)card.interval=(grade==='easy'?2:1);
        else if(card.reps===1)card.interval=(grade==='easy'?5:3);
        else card.interval=Math.round(card.interval*card.ease*(grade==='easy'?1.25:1));
        card.reps++; if(grade==='easy')card.ease+=0.1; }
  card.due=today()+card.interval; card.last=today(); return card;
}

function buildQueue(type,opt){
  opt=opt||{};
  let items;
  if(type==='grammar'){if(!opt.unit)return[];items=DATA.questions.filter(q=>q.type==='grammar'&&q.unit===opt.unit&&readable(q)&&(!gDiff||q.difficulty==gDiff));}
  else if(type==='reading')items=readingPool();
  else{const hasSub=(opt.sub!==undefined&&opt.sub!==''&&opt.sub!==null);items=opt.topic==='__MY__'?myVocabList():(hasSub?(themeChunks(opt.topic)[+opt.sub]||[]):DATA.vocab.filter(v=>(!opt.topic||v.unit===opt.topic)&&(!opt.level||v.level===opt.level)));}
  const d=P();
  items.sort((a,b)=>(a.difficultyScore||a.difficulty||0)-(b.difficultyScore||b.difficulty||0));
  const due=[],fresh=[];
  items.forEach(q=>{const s=d.srs[q.id]; if(!s)fresh.push(q); else if(s.due<=today())due.push(q);});
  due.sort((a,b)=>(d.srs[a.id].due)-(d.srs[b.id].due));
  // 一輪：到期的全收 + 8 新題(難度分層:約★1×4 ★2×2 ★3×2,且由易到難排好)
  return due.concat(pickFresh(fresh,8)).slice(0,15);
}
function pickFresh(fresh,n){
  const t={1:[],2:[],3:[]}; fresh.forEach(q=>{(t[q.difficulty]||t[2]).push(q)});
  const want={1:Math.ceil(n*0.5),2:Math.round(n*0.25)}; want[3]=n-want[1]-want[2];
  let out=[]; [1,2,3].forEach(k=>out=out.concat(t[k].slice(0,want[k])));
  if(out.length<n){const used=new Set(out);out=out.concat(fresh.filter(q=>!used.has(q)).slice(0,n-out.length));}
  return out.sort((a,b)=>(a.difficultyScore||0)-(b.difficultyScore||0));
}

.rdg-foot .rdg-lock{display:inline-flex;align-items:center;justify-content:center;gap:14px;margin-bottom:13px}

  font-size:15px;letter-spacing:2px;line-height:1.5;opacity:.82}

</style>
<script>
(function(){
  function mount(){
    var f=document.getElementById('rdgFoot'); if(!f) return;
    // 找最合適的捲動容器：優先文件流的 #app，其次頁面最大的內部捲動區，最後 body
    var app=document.getElementById('app');
    var target=null;
    if(app){ var s=getComputedStyle(app); if(s.overflowY==='visible'||s.overflowY==='') target=app; }
    if(!target){
      var best=null,area=0,els=document.body.getElementsByTagName('*');
      for(var i=0;i<els.length;i++){ var el=els[i];
        if(el===f||el.contains(f)) continue;
        var st=getComputedStyle(el);
        if(st.overflowY==='auto'||st.overflowY==='scroll'){
          var r=el.getBoundingClientRect();
          if(r.height>200&&r.width>140&&r.top<innerHeight&&r.bottom>0){
            var a=r.width*r.height; if(a>area){area=a;best=el;}
          }
        }
      }
      target=best||app||document.body;
    }
    try{ target.appendChild(f); }catch(e){ document.body.appendChild(f); }
    f.style.display='block';
  }
  if(document.readyState==='complete') setTimeout(mount,300);
  else window.addEventListener('load',function(){setTimeout(mount,300);});
})();
</script>
<script>/*ENG_SYNC_MODULE_V2*/
window.__ENG_APP="phrases";window.__ENG_LABEL="英語片語";
window.__ENG_SUMMARY=function(){
  var id=''; try{ id=localStorage.getItem('%NS%.current')||''; }catch(e){}
  var d={}; try{ d=JSON.parse(localStorage.getItem('%NS%.prog.'+id)||'{}'); }catch(e){}
  var srs=d.srs||{}, log=d.log||[];
  var mastered=Object.keys(srs).filter(function(k){return srs[k]&&srs[k].interval>=3}).length;
  var learned=Object.keys(srs).length;
  var total=(typeof DATA!=='undefined'&&DATA&&DATA.vocab)?((DATA.vocab.length)||Object.keys(DATA.vocab).length):291;
  var pct=Math.round(learned/total*100), plabel='已學過';
  var lead={k:'已學過',v:learned+'/'+total}, ansChip=[{k:'作答',v:log.length}];
  // 連續天數：直接由 log 時間戳推算，不依賴 App 內部函式(17 的函式包在 IIFE 內取不到)
  var days={};
  log.forEach(function(x){ if(x&&x.ts){ var t2=new Date(x.ts); days[t2.getFullYear()+'-'+t2.getMonth()+'-'+t2.getDate()]=1; } });
  var sk=0, cur=new Date();
  for(var i=0;i<400;i++){
    var kk=cur.getFullYear()+'-'+cur.getMonth()+'-'+cur.getDate();
    if(days[kk]){ sk++; cur.setDate(cur.getDate()-1); } else break;
  }
  return {pct: pct, pctLabel: plabel, total: total, streak: sk,
    metrics:[lead,{k:'精熟',v:mastered},{k:'待清錯題',v:(d.wrong||[]).length}].concat(ansChip).concat([{k:'已征服',v:d.overcome||0}])};
};
(function(){
  var APP=window.__ENG_APP||'app', LABEL=window.__ENG_LABEL||document.title;
  var K={url:'eng_sync_url',key:'eng_sync_key',child:'eng_child'};
  function G(k){ try{return localStorage.getItem(k)||''}catch(e){return ''} }
  function cfg(){ return {url:G(K.url), key:G(K.key), child:G(K.child)}; }
  function ready(){ var c=cfg(); return !!(c.url&&c.child); }
  try{
    var m=(location.hash||'').match(/sync=(.+)$/);
    if(m){
      var p=m[1].split('~').map(function(s){try{return decodeURIComponent(s)}catch(e){return s}});
      if(p[0]) localStorage.setItem(K.url,p[0].replace(/\/+$/,''));
      if(p[1]) localStorage.setItem(K.key,p[1]);
      if(p[2]) localStorage.setItem(K.child,p[2]);
      try{history.replaceState(null,'',location.pathname+location.search)}catch(e){}
      setTimeout(function(){ alert('✅ 家長後台已設定：這台是「'+(p[2]||'')+'」的裝置，之後所有英語 App 都會自動回報進度。'); },300);
    }
  }catch(e){}
  function report(){ try{ return window.__ENG_SUMMARY()||{}; }catch(e){ return {}; } }
  var t=null;
  function push(beacon){
    var c=cfg(); if(!c.url||!c.child) return;
    var r=report();
    // 把 App 內的真實總數存到共用 key，供「一鍵導入頁」用(免寫死、內容變了也跟得上)
    try{ if(typeof r.total==='number' && r.total>0) localStorage.setItem('eng_total_'+APP, r.total); }catch(e){}
    var body=JSON.stringify({child:c.child, app:APP, label:LABEL, key:c.key, ts:Date.now(),
      pct:(r.pct===undefined?null:r.pct), pctLabel:r.pctLabel||'進度',
      streak:(r.streak===undefined?null:r.streak), metrics:r.metrics||[]});
    var url=c.url+'/report';
    try{
      if(beacon && navigator.sendBeacon){ navigator.sendBeacon(url, new Blob([body],{type:'text/plain'})); return; }
      fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:body,keepalive:true})
        .then(function(){setDot(true)}).catch(function(){setDot(false)});
    }catch(e){}
  }
  function schedule(){ if(!ready()) return; if(t) clearTimeout(t); t=setTimeout(function(){push(false)},6000); }
  try{
    var _si=Storage.prototype.setItem;
    Storage.prototype.setItem=function(k,v){
      var r=_si.apply(this,arguments);
      try{ var s=String(k); if(s!=='eng_sync_url'&&s!=='eng_sync_key'&&s!=='eng_child') schedule(); }catch(e){}
      return r;
    };
  }catch(e){}
  window.addEventListener('pagehide',function(){ if(ready()) push(true); });
  document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='hidden'&&ready()) push(true); });
  function setDot(ok){ var d=document.getElementById('engSyncDot'); if(d) d.style.background=ok?'#2eb872':'#e8504f'; }
  window.engSyncNow=function(){ push(false); };
  window.engSync={push:push,cfg:cfg,report:report};
  setTimeout(function(){
    if(!ready()) return;
    if(document.getElementById('engSyncBadge')) return;
    var c=cfg();
    var b=document.createElement('div'); b.id='engSyncBadge';
    b.style.cssText='position:fixed;left:8px;bottom:calc(var(--nav-h,60px) + env(safe-area-inset-bottom) + 8px);z-index:60;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:3px 9px;border-radius:999px;display:flex;align-items:center;gap:5px;cursor:pointer';
    b.innerHTML='<span id="engSyncDot" style="width:8px;height:8px;border-radius:50%;background:#2eb872;display:inline-block"></span>☁️ '+c.child;
    b.title='點我立即同步'; b.onclick=function(){ engSyncNow(); };
    document.body.appendChild(b);
    push(false);
  }, 900);
})();
</script>
